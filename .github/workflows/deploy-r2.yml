name: Deploy to Cloudflare R2

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allow manual triggering

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: deploy-r2-main
      cancel-in-progress: false
    permissions:
      contents: read
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        set -euo pipefail
        sudo apt-get update
        sudo apt-get install -y inkscape webp unzip
        curl -fsSL https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip -o /tmp/awscliv2.zip
        unzip -q /tmp/awscliv2.zip -d /tmp
        if command -v aws >/dev/null 2>&1; then
          sudo /tmp/aws/install --update
        else
          sudo /tmp/aws/install
        fi
        rm -rf /tmp/awscliv2.zip /tmp/aws
        aws --version

    - name: Validate deploy prerequisites
      env:
        R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
        R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
        R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      run: |
        set -euo pipefail
        test -n "$R2_ENDPOINT_URL"
        test -n "$R2_ACCESS_KEY_ID"
        test -n "$R2_SECRET_ACCESS_KEY"
        test -d ./svg
        aws s3 ls s3://currency-icons/ --endpoint-url "$R2_ENDPOINT_URL" >/dev/null
    
    - name: Generate WebP files
      run: |
        set -euo pipefail
        chmod +x ./svg2webp.sh
        ./svg2webp.sh

    - name: Verify generated assets
      run: |
        set -euo pipefail
        test -d ./webp/32
        test -d ./webp/48
        test -d ./webp/64
        test -d ./webp/128
        test -d ./webp/256
        test -d ./webp/512
        test "$(find ./webp -type f | wc -l)" -gt 0
    
    - name: Deploy assets to R2
      env:
        R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
        R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
        R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      run: |
        set -euo pipefail
        chmod +x ./deploy-r2.sh
        ./deploy-r2.sh
    
    - name: Deployment completed
      run: |
        echo "✅ Deployment completed successfully!"
        echo "📁 SVG files uploaded to: s3://currency-icons/svg/"
        echo "🖼️ WebP files uploaded to: s3://currency-icons/webp/"
        echo "🏷️ Provider icons uploaded to: s3://currency-icons/providers/"
        echo "🌐 Files are now available via your R2 custom domain"