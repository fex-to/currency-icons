name: Deploy to Cloudflare R2

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allow manual triggering

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y inkscape webp awscli
    
    - name: Generate WebP files
      run: |
        chmod +x ./svg2webp.sh
        ./svg2webp.sh
    
    - name: Deploy assets to R2
      env:
        R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
        R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
        R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      run: |
        chmod +x ./deploy-r2.sh
        ./deploy-r2.sh
    
    - name: Deployment completed
      run: |
        echo "✅ Deployment completed successfully!"
        echo "📁 SVG files uploaded to: s3://currency-icons/svg/"
        echo "🖼️ WebP files uploaded to: s3://currency-icons/webp/"
        echo "🏷️ Provider icons uploaded to: s3://currency-icons/providers/"
        echo "🌐 Files are now available via your R2 custom domain"